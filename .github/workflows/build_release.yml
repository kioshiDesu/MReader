name: Build and Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: ./gradlew assembleStandardDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MangaReader-debug.apk
          path: app/build/outputs/apk/standard/debug/app-standard-debug.apk

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build release APK (unsigned)
        run: ./gradlew assembleStandardRelease

      - name: Find APKs
        id: find-apks
        run: |
          echo "universal=$(ls app/build/outputs/apk/standard/release/app-standard-universal-release-unsigned.apk 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "arm64=$(ls app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-unsigned.apk 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "armv7=$(ls app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-unsigned.apk 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "x86=$(ls app/build/outputs/apk/standard/release/app-standard-x86-release-unsigned.apk 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "x86_64=$(ls app/build/outputs/apk/standard/release/app-standard-x86_64-release-unsigned.apk 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Rename APKs
        if: steps.find-apks.outputs.universal != ''
        run: |
          mv app/build/outputs/apk/standard/release/app-standard-universal-release-unsigned.apk MangaReader.apk
          mv app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-unsigned.apk MangaReader-arm64-v8a.apk
          mv app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-unsigned.apk MangaReader-armeabi-v7a.apk
          mv app/build/outputs/apk/standard/release/app-standard-x86-release-unsigned.apk MangaReader-x86.apk
          mv app/build/outputs/apk/standard/release/app-standard-x86_64-release-unsigned.apk MangaReader-x86_64.apk

      - name: Get commit info
        id: commit-info
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MangaReader-release
          path: |
            MangaReader.apk
            MangaReader-arm64-v8a.apk
            MangaReader-armeabi-v7a.apk
            MangaReader-x86.apk
            MangaReader-x86_64.apk

      - name: Create Release
        if: steps.find-apks.outputs.universal != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: MangaReader v${{ github.run_number }}
          body: |
            ### What's New
            
            **Commit:** ${{ steps.commit-info.outputs.sha }}
            **Message:** ${{ steps.commit-info.outputs.message }}
            
            ### Download
            
            > ### If you are unsure which version to download then go with `MangaReader.apk`
            
            | Architecture | APK |
            |-------------|-----|
            | Universal | MangaReader.apk |
            | arm64-v8a | MangaReader-arm64-v8a.apk |
            | armeabi-v7a | MangaReader-armeabi-v7a.apk |
            | x86 | MangaReader-x86.apk |
            | x86_64 | MangaReader-x86_64.apk |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
