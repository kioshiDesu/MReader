name: Build and Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build release APK (unsigned)
        run: ./gradlew assembleStandardRelease

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          for apk in app/build/outputs/apk/standard/release/*-unsigned.apk; do
            name=$(basename "$apk" | sed 's/-unsigned.apk//')
            ${ANDROID_SDK_ROOT}/build-tools/35.0.1/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out "app/build/outputs/apk/standard/release/${name}-signed.apk" "$apk"
          done

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/standard/release/app-standard-universal-release-signed.apk MangaReader.apk
          mv app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-signed.apk MangaReader-arm64-v8a.apk
          mv app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-signed.apk MangaReader-armeabi-v7a.apk
          mv app/build/outputs/apk/standard/release/app-standard-x86-release-signed.apk MangaReader-x86.apk
          mv app/build/outputs/apk/standard/release/app-standard-x86_64-release-signed.apk MangaReader-x86_64.apk

      - name: Get commit info
        id: commit-info
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: MangaReader v${{ github.run_number }}
          body: |
            ### What's New
            
            **Commit:** ${{ steps.commit-info.outputs.sha }}
            **Message:** ${{ steps.commit-info.outputs.message }}
            
            ### Download
            
            > ### If you are unsure which version to download then go with `MangaReader.apk`
            
            | Architecture | APK |
            |-------------|-----|
            | Universal | MangaReader.apk |
            | arm64-v8a | MangaReader-arm64-v8a.apk |
            | armeabi-v7a | MangaReader-armeabi-v7a.apk |
            | x86 | MangaReader-x86.apk |
            | x86_64 | MangaReader-x86_64.apk |
          files: |
            MangaReader.apk
            MangaReader-arm64-v8a.apk
            MangaReader-armeabi-v7a.apk
            MangaReader-x86.apk
            MangaReader-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ github.token }}
